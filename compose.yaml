# newsromania — own rootless-Docker stack (CLAUDE.md §5/§21.3 conformant):
# internal network; ONLY the app's :3100 is published beyond loopback.
# Postgres/Redis expose loopback-only dev ports inside the reserved
# 3100–3199 range (host-side workers/migrations/backups); never public.
name: newsromania

services:
  postgres:
    image: postgres:17-alpine
    container_name: newsromania-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:3132:5432'
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  redis:
    image: redis:7-alpine
    container_name: newsromania-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      [
        'redis-server',
        '--requirepass', '${REDIS_PASSWORD}',
        '--maxmemory', '200mb',
        '--maxmemory-policy', 'allkeys-lru',
        '--appendonly', 'no',
      ]
    ports:
      - '127.0.0.1:3179:6379'
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $${REDIS_PASSWORD} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  # Self-hosted analytics (cookieless, GDPR-friendly — consent-free per §7).
  # Umami serves at its container ROOT. DASHBOARD is exposed on the dedicated
  # subdomain stats.newsromania.info (deploy/nginx/stats.newsromania.info.conf →
  # 127.0.0.1:3141) where the image's baked root-absolute /_next paths are
  # correct and the SPA loads fully. FIRST-PARTY TRACKING stays same-origin: the
  # app route src/app/stats/[[...path]]/route.ts proxies /stats/script.js +
  # /stats/api/* to this container's root. Published ONLY to loopback in the
  # reserved 3100–3199 range. Data lives in a SEPARATE `umami` database + role on
  # the EXISTING postgres container (NOT the app DB/schema) — docs/operations.md §11.
  umami:
    profiles: [app]
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: newsromania-umami
    restart: unless-stopped
    environment:
      # Separate DB `umami` on the shared postgres container (service DNS).
      DATABASE_URL: postgres://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD}@postgres:5432/${UMAMI_DB_NAME:-umami}
      DATABASE_TYPE: postgresql
      # Signs the Umami session/JWT — from .env UMAMI_APP_SECRET.
      APP_SECRET: ${UMAMI_APP_SECRET}
      # Umami listens on :3000 inside the container (root basePath).
      PORT: '3000'
      # Tracker served at /script.js (proxied first-party as /stats/script.js).
      TRACKER_SCRIPT_NAME: script
    ports:
      # Loopback-only, reserved range. Reached by BOTH the app's /stats tracking
      # proxy (internal compose DNS `umami`) and the stats.newsromania.info nginx
      # server block (dashboard). No public port is opened directly.
      - '127.0.0.1:3141:3000'
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]
    healthcheck:
      # Umami serves at root, so the in-container probe hits /api/heartbeat.
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:3000/api/heartbeat || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: 384m
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  # App service (production runtime) — enabled with: docker compose --profile app up
  app:
    profiles: [app]
    build:
      context: .
      args:
        # Ad preview mode — NEXT_PUBLIC (inlined at build). Set in .env; '0' for launch.
        NEXT_PUBLIC_AD_PREVIEW: ${NEXT_PUBLIC_AD_PREVIEW:-0}
    container_name: newsromania-app
    restart: unless-stopped
    env_file: .env
    environment:
      # container-perspective overrides of the host-perspective .env values
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      PORT: '3100'
      NODE_ENV: production
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - ./media:/app/media
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal]
    mem_limit: 1g
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
