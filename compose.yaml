# newsromania — own rootless-Docker stack (CLAUDE.md §5/§21.3 conformant):
# internal network; ONLY the app's :3100 is published beyond loopback.
# Postgres/Redis expose loopback-only dev ports inside the reserved
# 3100–3199 range (host-side workers/migrations/backups); never public.
name: newsromania

services:
  postgres:
    image: postgres:17-alpine
    container_name: newsromania-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:3132:5432'
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  redis:
    image: redis:7-alpine
    container_name: newsromania-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      [
        'redis-server',
        '--requirepass', '${REDIS_PASSWORD}',
        '--maxmemory', '200mb',
        '--maxmemory-policy', 'allkeys-lru',
        '--appendonly', 'no',
      ]
    ports:
      - '127.0.0.1:3179:6379'
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $${REDIS_PASSWORD} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  # Self-hosted analytics (cookieless, GDPR-friendly — consent-free per §7).
  # Served SAME-ORIGIN via a next.config rewrite (/stats/:path* → umami:3000),
  # so the tracker script + /stats/api/send are first-party (no nginx change,
  # no sudo). Published ONLY to loopback in the reserved 3100–3199 range; the
  # app reaches it over the internal compose network (service DNS `umami`). Its
  # data lives in a SEPARATE `umami` database + role on the EXISTING postgres
  # container (NOT the app DB/schema) — one-time create step in
  # docs/operations.md §11.
  umami:
    profiles: [app]
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: newsromania-umami
    restart: unless-stopped
    environment:
      # Separate DB `umami` on the shared postgres container (service DNS).
      DATABASE_URL: postgres://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD}@postgres:5432/${UMAMI_DB_NAME:-umami}
      DATABASE_TYPE: postgresql
      # Signs the Umami session/JWT — from .env UMAMI_APP_SECRET.
      APP_SECRET: ${UMAMI_APP_SECRET}
      # Umami listens on :3000 inside the container; only reached via the rewrite.
      PORT: '3000'
      # Serve the tracker at /stats/script.js (matches the layout <script src>).
      TRACKER_SCRIPT_NAME: script
      # Run Umami UNDER the /stats subpath so the dashboard HTML, all /_next/*
      # asset URLs, the tracker (/stats/script.js) and the collector
      # (/stats/api/send) self-reference under /stats and resolve through the app
      # rewrite below. Without it, Umami emits ROOT-absolute /_next/* asset URLs
      # that 404 under /stats (the Next.js APP answers them, not Umami) → the
      # dashboard renders a blank white page (the owner's report).
      #
      # NOTE: the stock image is a Next.js STANDALONE build with basePath baked
      # in as "" at BUILD time; its start-docker script never rebuilds, so a
      # `BASE_PATH` env var is a NO-OP. The real mechanism is the entrypoint shim
      # below, which patches the embedded basePath/assetPrefix in server.js to
      # /stats at boot (idempotent). See deploy/umami/basepath-entrypoint.sh.
      #
      # PAIRED CHANGE: because Umami now expects the /stats prefix on incoming
      # requests, next.config.ts rewrites() forwards the FULL path (keeps the
      # /stats prefix) instead of stripping it — the two MUST change together.
    # Patch the standalone server.js basePath/assetPrefix → /stats before Umami
    # starts (see the shim's header for why a BASE_PATH env cannot work here),
    # then hand off to the image's real entrypoint + CMD.
    entrypoint: ['/bin/sh', '/usr/local/bin/umami-basepath-entrypoint.sh']
    # Overriding `entrypoint` drops the image's CMD, so restate it — the shim
    # execs `docker-entrypoint.sh "$@"`, i.e. the original `npm run start-docker`.
    command: ['npm', 'run', 'start-docker']
    volumes:
      - ./deploy/umami/basepath-entrypoint.sh:/usr/local/bin/umami-basepath-entrypoint.sh:ro
    ports:
      # Loopback-only, reserved range. Direct hits are for first-run admin only;
      # public traffic always goes through the app's same-origin /stats rewrite.
      - '127.0.0.1:3141:3000'
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]
    healthcheck:
      # BASE_PATH=/stats moves ALL Umami routes (incl. /api/heartbeat) under the
      # /stats prefix, so the in-container probe must hit /stats/api/heartbeat —
      # /api/heartbeat now 404s and would flap the container unhealthy.
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:3000/stats/api/heartbeat || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: 384m
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  # App service (production runtime) — enabled with: docker compose --profile app up
  app:
    profiles: [app]
    build:
      context: .
      args:
        # Ad preview mode — NEXT_PUBLIC (inlined at build). Set in .env; '0' for launch.
        NEXT_PUBLIC_AD_PREVIEW: ${NEXT_PUBLIC_AD_PREVIEW:-0}
    container_name: newsromania-app
    restart: unless-stopped
    env_file: .env
    environment:
      # container-perspective overrides of the host-perspective .env values
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      PORT: '3100'
      NODE_ENV: production
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - ./media:/app/media
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal]
    mem_limit: 1g
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
