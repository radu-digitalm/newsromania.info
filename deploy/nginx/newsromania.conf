# newsromania.info — nginx site config (template, deploy/nginx/ — arch §9).
# Installed by deploy/sudo-block-2-nginx-certbot.sh to
# /etc/nginx/sites-available/newsromania (+ sites-enabled symlink).
#
# HTTP only on purpose: `certbot --nginx --redirect` (last step of sudo
# block 2) rewrites this file with the 443 server block + HTTP→HTTPS
# redirect once DNS points at this VPS.
#
# CSP is deliberately DEFERRED: AdSense/Amazon require a carefully built
# script-src/frame-src allowlist (googlesyndication, doubleclick, amazon-
# adsystem, consent iframes...). Shipping a wrong CSP silently blanks ad
# slots — add it only after AdSense approval, tested against real ad loads.

# Health-check and cache-bypass note: the app itself is only reachable via
# 127.0.0.1:3100 (compose publishes loopback-only); nginx is the sole public
# entry point.

server {
    listen 80;
    listen [::]:80;
    server_name newsromania.info www.newsromania.info;

    access_log /var/log/nginx/newsromania.access.log;
    error_log /var/log/nginx/newsromania.error.log;

    # Payload media uploads go through the admin (proxied) — allow up to 20m.
    client_max_body_size 20m;

    # --- security headers (inherited by locations WITHOUT own add_header) ---
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    # --- gzip for text-ish types (images/fonts are already compressed) ------
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # --- ACME webroot (certbot HTTP-01) — served from the project web root --
    # /var/www/newsromania is owned newsagent:www-data, g+rX, setgid dirs.
    location /.well-known/acme-challenge/ {
        root /var/www/newsromania;
    }

    # --- long-cache, content-hashed / immutable assets ----------------------
    # add_header in a location REPLACES inherited headers, so the security
    # trio is repeated here on purpose.
    location ~ ^/(_next/static/|icons/|placeholders/|og-default\.png$) {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    # --- everything else → Next.js standalone on loopback :3100 -------------
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
