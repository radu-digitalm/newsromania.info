# newsromania.info — nginx site config (arch §9).
# Cutover drop-in: the domain already has a valid Let's Encrypt cert (issued
# for the old WordPress site), so this is a COMPLETE config (80 redirect + 443
# proxy) that REUSES that cert — no certbot run needed. Install over the
# existing /etc/nginx/sites-available/newsromania and reload.
#
# CSP is deliberately DEFERRED: AdSense/Amazon need a carefully built
# script-src/frame-src allowlist; a wrong CSP silently blanks ad slots. Add it
# only after AdSense approval, tested against real ad loads.

# --- HTTP → HTTPS (keep ACME path so certbot auto-renewal keeps working) ----
server {
    listen 80;
    listen [::]:80;
    server_name newsromania.info www.newsromania.info;

    location /.well-known/acme-challenge/ {
        root /var/www/newsromania;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS → Next.js standalone on loopback :3100 ---------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name newsromania.info www.newsromania.info;

    # Existing Certbot-managed cert (from the old WP site) — reused as-is.
    ssl_certificate /etc/letsencrypt/live/newsromania.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newsromania.info/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/newsromania.access.log;
    error_log /var/log/nginx/newsromania.error.log;

    # Payload media uploads go through the admin (proxied) — allow up to 20m.
    client_max_body_size 20m;

    # --- security headers (repeated in locations that set their own) --------
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;
    # HSTS (443 only — never on :80). Conservative 1y, no preload; strengthen
    # to includeSubDomains/preload later once you're sure all subdomains are HTTPS.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # --- gzip for text-ish types --------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript
        application/xml application/rss+xml image/svg+xml;

    # --- long-cache, content-hashed / immutable assets ----------------------
    location ~ ^/(_next/static/|icons/|placeholders/|og-default\.png$) {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Strict-Transport-Security "max-age=31536000" always;
    }

    # --- everything else → the app ------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
