# =============================================================================
# stats.newsromania.info — Umami analytics DASHBOARD (owner fix round 2)
# =============================================================================
# Serves the self-hosted Umami UI at the ROOT of its own subdomain, proxying to
# the loopback-published umami container (127.0.0.1:3141 → container :3000).
#
# WHY A SUBDOMAIN: the stock Umami image bakes a "/_next" client publicPath into
# a Turbopack runtime chunk at build time, so it can only be served correctly
# from a ROOT path. Under a subpath (/stats) the dashboard SPA hangs on a
# spinner. At the root of this subdomain those baked paths are correct and the
# UI loads fully. (First-party TRACKING stays same-origin on the main site via
# newsromania.info/stats/* — handled by the Next app, not this block.)
#
# INSTALL (owner, root — batched with any other pending nginx work):
#   1. DNS: add an A record  stats.newsromania.info → 92.222.91.167  (AAAA too if
#      the box has IPv6). Wait for it to resolve.
#   2. sudo cp deploy/nginx/stats.newsromania.info.conf \
#          /etc/nginx/sites-available/stats.newsromania.info
#      sudo ln -s /etc/nginx/sites-available/stats.newsromania.info \
#          /etc/nginx/sites-enabled/
#   3. Obtain the cert (nginx plugin edits this file's 443 block in place):
#      sudo certbot --nginx -d stats.newsromania.info
#   4. sudo nginx -t && sudo systemctl reload nginx
# HSTS on the main site intentionally omits includeSubDomains, so this subdomain
# is reachable over HTTPS independently.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name stats.newsromania.info;

    # Let certbot answer the HTTP-01 challenge here.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name stats.newsromania.info;

    # certbot --nginx fills these in (paths shown for reference).
    ssl_certificate /etc/letsencrypt/live/stats.newsromania.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stats.newsromania.info/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers. No includeSubDomains inheritance issues here.
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Umami dashboard tracks nothing sensitive in query strings; modest body
    # limit is plenty for its API.
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3141;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
