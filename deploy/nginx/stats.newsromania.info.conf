# =============================================================================
# stats.newsromania.info — Umami analytics DASHBOARD (owner fix round 2)
# =============================================================================
# Serves the self-hosted Umami UI at the ROOT of its own subdomain, proxying to
# the loopback-published umami container (127.0.0.1:3141 → container :3000).
#
# WHY A SUBDOMAIN: the stock Umami image bakes a "/_next" client publicPath into
# a Turbopack runtime chunk at build time, so it can only be served correctly
# from a ROOT path. Under a subpath (/stats) the dashboard SPA hangs on a
# spinner. At the root of this subdomain those baked paths are correct and the
# UI loads fully. (First-party TRACKING stays same-origin on the main site via
# newsromania.info/stats/* — handled by the Next app, not this block.)
#
# HTTP-ONLY ON PURPOSE: this file ships with NO 443/ssl block. `certbot --nginx`
# needs a valid config to start from — a hardcoded ssl_certificate path that
# does not exist yet makes `nginx -t` fail BEFORE the cert can be issued
# (chicken-and-egg). certbot obtains the cert AND injects its own 443 server
# block here (cloning the proxy below + adding an 80→443 redirect). Do NOT
# pre-add an ssl block.
#
# INSTALL (owner, root — DNS A record stats.newsromania.info → 92.222.91.167 is
# already resolving):
#   sudo cp deploy/nginx/stats.newsromania.info.conf \
#           /etc/nginx/sites-available/stats.newsromania.info
#   sudo ln -sf /etc/nginx/sites-available/stats.newsromania.info \
#           /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d stats.newsromania.info   # issues cert + adds 443
# HSTS on the main site intentionally omits includeSubDomains, so this subdomain
# is reachable over HTTPS independently once certbot runs.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name stats.newsromania.info;

    # Security headers — certbot copies these into the 443 block it generates.
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3141;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
